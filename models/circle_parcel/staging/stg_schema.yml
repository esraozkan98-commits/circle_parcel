# Bu dosya staging modellerinin testlerini ve kaynak tanımlarını içerir.

version: 2

sources:
  - name: raw_data_circle
    # BigQuery'deki ham veri dataset'i
    database: primordial-mile-449805-j0
    schema: raw_data_circle
    tables:
      - name: raw_cc_parcel
      - name: raw_cc_parcel_product

models:
  - name: stg_cc_parcel
    description: "Ham parcel verisinin staging modeli"
    columns:
      - name: parcel_id
        description: "Paketin benzersiz kimliği"
        tests:
          - unique
          - not_null

  - name: stg_cc_parcel_products
    description: "Ham parcel ürün verisinin staging modeli"
    columns:
      - name: parcel_id
        description: "Pakete ait foreign key"
        tests:
          - not_null