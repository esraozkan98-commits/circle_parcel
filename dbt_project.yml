seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  circle_parcel:
    +schema: 'parcel_dbt_dev'
    staging:
      +schema: 'parcel_dbt_dev_staging'